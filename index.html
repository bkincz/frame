<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/vite.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<style>
			:root {
				--surface00: #f7f7f7;
				--surface01: #f0eeee;
				--surface02: #e7e6e6;
				--surface03: #e0dede;
				--surface04: #d1d0d0;

				--border0a: #e0e0e0;
				--border00: #dbdbdb;
				--border01: #cccccc;
				--border02: #bebebe;

				--shadow00: #b6b4b4;
				--shadow01: #818080;
				--shadow02: #585757;

				--text00: #3b3b3b;
				--text01: #4d4b4b;
				--text02: #585757;
				--text03: #6d6b6b;
				--text04: #959697;

				--action-background: transparent;
				--action-border: #3b3b3b;
				--action-text: var(--text00);
				--action-background-hover: #4d4b4b;
				--action-border-hover: #4d4b4b;
				--action-text-hover: #f7f7f7;
			}

			body {
				background-color: var(--surface00);
				color: var(--text00);
			}

			header {
				display: flex;
				flex-flow: row nowrap;
				align-items: center;
				width: 100%;
				padding-bottom: 24px;
				margin: 24px 32px 0;
				border-bottom: 2px solid var(--border0a);
				font-size: 18px;
				font-weight: 800;
				text-transform: uppercase;
				font-family: 'JetBrains Mono', monospace;
			}

			.heading {
				display: flex;
				align-items: center;
				gap: 24px;
				font-size: 14px;
				font-weight: 800;
				text-transform: uppercase;
				font-family: 'JetBrains Mono', monospace;
			}

			.heading::after {
				content: '';
				flex: 1;
				height: 1px;
				background-color: var(--border01);
			}

			.card {
				display: flex;
				flex-flow: column nowrap;
				width: calc(100% - 64px);
				min-width: 300px;
				gap: 24px;
				border: 2px solid var(--border00);
				padding: 24px 32px;
				border-radius: 12px;
			}

			.grid {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
				grid-auto-rows: auto;
				grid-auto-flow: row;
				gap: 24px;
				width: 100%;
			}

			button {
				cursor: pointer;
				display: flex;
				flex-flow: row nowrap;
				align-items: center;
				padding: 12px 24px;
				white-space: nowrap;
				background-color: var(--action-background);
				border: 2px solid var(--action-border);
				color: var(--action-text);
				font-weight: 800;
				font-size: 12px;
				text-transform: uppercase;
				border-radius: 8px;
				transition: all 0.2s ease-in-out;
				font-family: 'JetBrains Mono', monospace;

				&:hover {
					background-color: var(--action-background-hover);
					border-color: var(--action-border-hover);
					color: var(--action-text-hover);
					box-shadow: 0 2px 8px var(--shadow00);
				}
			}

			.layout {
				display: flex;
				flex-flow: column nowrap;
				align-items: center;
				gap: 32px;
				padding-inline: 32px;
			}
		</style>
		<title>Frame</title>
		<script>
			function openFrame(flow, step) {
				const url = new URL(window.location.href)
				url.searchParams.set('flow', flow)
				if (step) {
					url.searchParams.set('step', step)
				}
				window.history.pushState(null, '', url.toString())
				window.dispatchEvent(new Event('popstate'))
			}
		</script>
	</head>
	<body>
		<div class="layout">
			<header class="header">Frame Application</header>
			<section class="grid">
				<div class="card">
					<h4 class="heading">Example Flow (Fullscreen)</h4>
					<div style="display: flex; flex-direction: column; gap: 12px;">
						<button onclick="openFrame('example', 1)">Open Example - Step 1</button>
						<button onclick="openFrame('example', 2)">Open Example - Step 2</button>
						<button onclick="openFrame('example', 3)">Open Example - Step 3</button>
						<button onclick="openFrame('example', 4)">Open Example - Step 4</button>
					</div>
				</div>
				<div class="card">
					<h4 class="heading">Modal Flow (Centered)</h4>
					<div style="display: flex; flex-direction: column; gap: 12px;">
						<button onclick="openFrame('modal', 1)">Open Modal - Step 1</button>
						<button onclick="openFrame('modal', 2)">Open Modal - Step 2</button>
					</div>
				</div>
				<div class="card">
					<h4 class="heading">Error Handling</h4>
					<div style="display: flex; flex-direction: column; gap: 12px;">
						<button onclick="openFrame('nonexistent', 1)">Invalid Flow (Console Error)</button>
					</div>
				</div>
			</section>
		</div>
		<div id="hh-root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
